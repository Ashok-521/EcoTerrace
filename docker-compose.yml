version: '3.8'

services:
  # EcoTerrace Backend
  web:
    build: .
    container_name: ecoterrace_web
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://ecoterrace_user:${DB_PASSWORD:-secure_ecoterrace_2026}@db:5432/ecoterrace
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - UPLOAD_FOLDER=/app/uploads
      - MAX_CONTENT_LENGTH=16777216
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - ecoterrace_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: ecoterrace_db
    environment:
      POSTGRES_DB: ecoterrace
      POSTGRES_USER: ecoterrace_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_ecoterrace_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - ecoterrace_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoterrace_user -d ecoterrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecoterrace_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecoterrace_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ecoterrace_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
    networks:
      - ecoterrace_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ecoterrace_network:
    driver: bridge
